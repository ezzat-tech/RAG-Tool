name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "0 */5 * * *" # Runs every 5 hours to prevent inactivity spin-down
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up app
        run: curl -sL --max-time 120 https://rag-tool.streamlit.app/ -o /dev/null || true

      - name: Wait for app to boot
        run: sleep 60

      - name: Confirm app is alive
        run: curl -sL --max-time 120 https://rag-tool.streamlit.app/ -o /dev/null || echo "App may still be booting"
